<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="600" viewBox="0 0 1400 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A4565"/>
      <stop offset="35%" stop-color="#5C3A52"/>
      <stop offset="65%" stop-color="#D4522A"/>
      <stop offset="85%" stop-color="#F2B517"/>
      <stop offset="100%" stop-color="#FFE4B0"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0E4E7C"/>
      <stop offset="50%" stop-color="#1A7EC5"/>
      <stop offset="100%" stop-color="#0E2C4A"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.72" cy="0.7" r="0.06">
      <stop offset="0%" stop-color="#FFF2D4" stop-opacity="1"/>
      <stop offset="100%" stop-color="#F2B517" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Sky -->
  <rect width="1400" height="600" fill="url(#sky)"/>

  <!-- Sun glow -->
  <ellipse cx="1010" cy="420" rx="80" ry="80" fill="#FFE5A8" opacity="0.95"/>
  <ellipse cx="1010" cy="420" rx="160" ry="160" fill="url(#sun)"/>

  <!-- Distant land silhouette -->
  <path d="M 0 440 Q 200 425 400 435 T 800 430 T 1200 440 L 1400 445 L 1400 470 L 0 470 Z" fill="#3A2840" opacity="0.55"/>

  <!-- Water -->
  <rect x="0" y="465" width="1400" height="135" fill="url(#water)"/>

  <!-- Sun reflection on water -->
  <ellipse cx="1010" cy="475" rx="60" ry="6" fill="#FFE5A8" opacity="0.5"/>
  <ellipse cx="1010" cy="490" rx="90" ry="4" fill="#FFE5A8" opacity="0.3"/>
  <ellipse cx="1010" cy="510" rx="120" ry="3" fill="#FFE5A8" opacity="0.2"/>

  <!-- Subtle wave details -->
  <path d="M 0 540 Q 175 535 350 540 T 700 540 T 1050 540 T 1400 540" stroke="#FFFFFF" stroke-opacity="0.15" stroke-width="1.5" fill="none"/>
  <path d="M 0 580 Q 175 575 350 580 T 700 580 T 1050 580 T 1400 580" stroke="#FFFFFF" stroke-opacity="0.1" stroke-width="1" fill="none"/>

  <!-- Palm tree silhouette left side -->
  <g opacity="0.92">
    <!-- Trunk -->
    <path d="M 150 600 Q 165 500 170 380 Q 172 300 180 260" stroke="#1A1714" stroke-width="6" fill="none"/>
    <!-- Fronds -->
    <path d="M 180 260 Q 130 240 80 220 Q 100 245 130 260 Q 140 268 180 260" fill="#1A1714"/>
    <path d="M 180 260 Q 230 235 285 220 Q 255 250 220 265 Q 200 270 180 260" fill="#1A1714"/>
    <path d="M 180 260 Q 145 200 110 165 Q 135 200 165 240 Q 175 255 180 260" fill="#1A1714"/>
    <path d="M 180 260 Q 215 195 250 160 Q 230 200 200 245 Q 188 258 180 260" fill="#1A1714"/>
    <path d="M 180 260 Q 175 195 175 145 Q 188 195 195 245 Q 188 257 180 260" fill="#1A1714"/>
  </g>

  <!-- Two small figures on the beach (silhouettes) -->
  <g fill="#1A1714" opacity="0.75">
    <!-- Figure 1 -->
    <ellipse cx="610" cy="455" rx="2.5" ry="3"/>
    <rect x="608.5" y="457" width="3" height="9" rx="1"/>
    <!-- Figure 2, slightly behind -->
    <ellipse cx="625" cy="457" rx="2.5" ry="3"/>
    <rect x="623.5" y="459" width="3" height="8" rx="1"/>
  </g>

  <!-- Subtle placeholder label, bottom right -->
  <text x="1380" y="585" text-anchor="end" font-family="Inter, sans-serif" font-size="10" fill="#FFFFFF" opacity="0.4" letter-spacing="2">PLAATSHOUDER</text>
</svg>
